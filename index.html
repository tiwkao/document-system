<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบออกเลขส่งหนังสือ - GitHub Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-black p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">ระบบสารบรรณออนไลน์</h1>
            <a href="manage.html" class="bg-white text-black px-4 py-2 rounded-md text-sm font-semibold hover:bg-gray-200 transition">
                ดูทะเบียนย้อนหลัง →
            </a>
        </div>
    </nav>

    <div class="container mx-auto max-w-2xl mt-10 p-6">
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-extrabold text-gray-800">ออกเลขส่งหนังสือ</h2>
                <p class="text-gray-500 mt-2">กรอกรายละเอียดเพื่อขอรับเลขทะเบียนส่ง</p>
            </div>

            <form id="issueForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">เลขที่หนังสืออ้างอิง</label>
                    <input type="text" name="docReference" placeholder="เช่น สธ 0032.1/..." class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black focus:outline-none">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">เรื่อง <span class="text-red-500">*</span></label>
                    <input type="text" name="subject" required placeholder="ระบุชื่อเรื่องหนังสือ" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black focus:outline-none">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">จาก</label>
                        <input type="text" name="sender" value="สืบสวน 2 บก.สส.ภ.6" class="w-full p-3 border border-gray-300 rounded-lg bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">ถึง <span class="text-red-500">*</span></label>
                        <input type="text" name="receiver" required placeholder="หน่วยงานปลายทาง" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black focus:outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">แนบไฟล์สแกน (ถ้ามี)</label>
                    <input type="file" id="fileInput" accept="image/*,application/pdf" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-black file:text-white hover:file:bg-gray-800">
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-black text-white py-4 rounded-lg font-bold text-lg hover:bg-gray-800 transition duration-300 shadow-lg">
                    บันทึกและออกเลขส่ง
                </button>
            </form>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        const form = document.getElementById('issueForm');
        
        // ค้นหาส่วน form.onsubmit ใน index.html แล้ววางทับด้วยอันนี้
form.onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerText = "กำลังประมวลผล...";

    const fileInput = document.getElementById('fileInput').files[0];
    let fileData = { base64: null, name: null };

    if (fileInput) {
        const reader = new FileReader();
        fileData = await new Promise((resolve) => {
            reader.onload = (ev) => resolve({
                base64: ev.target.result.split(',')[1],
                name: fileInput.name
            });
            reader.readAsDataURL(fileInput);
        });
    }

    const formData = new FormData(form);
    const payload = {
        action: "issueNumber",
        docReference: formData.get('docReference'),
        subject: formData.get('subject'),
        sender: formData.get('sender'),
        receiver: formData.get('receiver'),
        base64: fileData.base64,
        fileName: fileData.name
    };

    try {
        // ใช้โหมด no-cors ไม่ได้ เพราะเราต้องการอ่านเลขที่ส่งกลับมา
        // ต้องมั่นใจว่าใน Code.gs มีการ setHeader('Access-Control-Allow-Origin', '*')
        const response = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify(payload),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' } // ใช้ text/plain เพื่อเลี่ยงปัญหา CORS บางประเภท
        });

        const result = await response.text();

        if (result.includes("Error")) throw new Error(result);

        Swal.fire({
            title: 'ออกเลขสำเร็จ!',
            html: `เลขทะเบียนส่งของคุณคือ<br><b class="text-5xl text-blue-600">${result}</b>`,
            icon: 'success',
            confirmButtonText: 'ตกลง',
            confirmButtonColor: '#000'
        });
        form.reset();
    } catch (error) {
        console.error(error);
        Swal.fire('ผิดพลาด', 'กรุณาเช็กการตั้งค่า Deployment หรือสิทธิ์การเข้าถึงโฟลเดอร์', 'error');
    } finally {
        btn.disabled = false;
        btn.innerText = "บันทึกและออกเลขส่ง";
    }
};
    </script>
</body>
</html>
