<script src="config.js"></script>
<script>
    const rowsPerPage = 10;
    let currentPage = 1;
    let tableData = [];
    let filteredData = [];

    // ฟังก์ชันดึงข้อมูลจาก Google Sheets ผ่าน API
    async function fetchData() {
        const tableBody = document.querySelector("#data-table tbody");
        tableBody.innerHTML = `<tr><td colspan="4" class="text-center py-8">กำลังโหลดข้อมูลจาก Cloud...</td></tr>`;

        try {
            // ส่ง parameter method=getData ไปที่ Script
            const response = await fetch(`${API_URL}?method=getData`);
            const data = await response.json();
            
            // data[0] คือหัวตาราง, data.slice(1) คือข้อมูลจริง
            tableData = data.slice(1); 
            applyFilters();
        } catch (error) {
            console.error("Error:", error);
            Swal.fire("Error", "เชื่อมต่อฐานข้อมูลไม่ได้", "error");
        }
    }

    // ฟังก์ชันส่งแก้ไขข้อมูล (POST)
    async function updateData(formData) {
        try {
            const response = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify(formData)
            });
            const result = await response.text();
            Swal.fire("สำเร็จ", "แก้ไขข้อมูลแล้ว", "success");
            fetchData(); // โหลดข้อมูลใหม่
        } catch (error) {
            Swal.fire("ผิดพลาด", "บันทึกไม่สำเร็จ", "error");
        }
    }

    // เรียกโหลดข้อมูลครั้งแรกเมื่อเปิดหน้าเว็บ
    window.onload = fetchData;

    // ... (ฟังก์ชัน displayPage และ Filter อื่นๆ ปรับตามที่ผมแนะนำในข้อความก่อนหน้า) ...
</script>
